name: Visit-With-Us MLOps Pipeline

on:
  push:
    branches:
      - main

permissions:
  contents: write   # 👈 IMPORTANT (Allows push)

jobs:
  train-and-update-model:
    runs-on: ubuntu-latest

    steps:

      - name: Checkout Code
        uses: actions/checkout@v3
        with:
          token: ${{ secrets.GITHUB_TOKEN }}

      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      - name: Install Dependencies
        run: |
          pip install --upgrade pip
          pip install -r deployment/requirements.txt

      - name: Run Training Script
        run: |
          python src/train.py

      - name: Commit Updated Model
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add wellness_model.pkl
          git commit -m "Auto-updated model via CI pipeline" || echo "No changes to commit"
          git push
