name: Visit-With-Us MLOps Pipeline

on:
  push:
    branches:
      - main

jobs:
  train-and-update-model:
    runs-on: ubuntu-latest

    steps:

      # 1️⃣ Checkout repository
      - name: Checkout Code
        uses: actions/checkout@v3

      # 2️⃣ Setup Python
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: "3.10"

      # 3️⃣ Install dependencies
      - name: Install Required Libraries
        run: |
          pip install --upgrade pip
          pip install -r deployment/requirements.txt

      # 4️⃣ Run Training Script
      - name: Train Model
        run: |
          python src/train.py

      # 5️⃣ Commit Updated Model
      - name: Commit and Push Updated Model
        run: |
          git config --global user.name "github-actions"
          git config --global user.email "actions@github.com"
          git add wellness_model.pkl
          git diff --quiet && git diff --staged --quiet || git commit -m "Auto-updated model via CI pipeline"
          git push
